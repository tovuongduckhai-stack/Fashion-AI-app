<script type="text/babel">
const {useState,useRef,useEffect}=React;

// ✅ KHÔNG CÒN process.env ở đây — key nằm an toàn trong /api/analyze.js trên server
const BACKEND="/api";
const GOOGLE_CLIENT_ID="479363055580-6qdl8sr60sunoagd0522iveig8ps5irk.apps.googleusercontent.com";
const FREE_LIMIT=3;
const PLANS={Starter:{price:199000,label:"199.000₫",per:"/tháng",credits:30},Pro:{price:499000,label:"499.000₫",per:"/tháng",credits:100},"Credit lẻ":{price:15000,label:"15.000₫",per:"/lượt",credits:1}};
const BANK={name:"TÔ VƯƠNG ĐỨC KHẢI",bankId:"MB",account:"9704229205413121466",display:"9704 2292 0541 3121 466"};
const G={bg:"#080808",sur:"#111111",bor:"#1a2a1a",gold:"#4CAF50",gdim:"#2d6e30",tx:"#E8E0D0",dim:"#7a7060",faint:"#1a2a1a",red:"#e05050",grn:"#50c878"};

function genCode(){const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="STY-";for(let i=0;i<5;i++)s+=c[Math.floor(Math.random()*c.length)];return s;}
function qrUrl(plan,code){const p=PLANS[plan];const note=`STYLAIR ${plan.toUpperCase()} ${code}`;return `https://img.vietqr.io/image/${BANK.bankId}-${BANK.account}-compact2.png?amount=${p.price}&addInfo=${encodeURIComponent(note)}&accountName=${encodeURIComponent(BANK.name)}`;}
function parseJwt(token){try{return JSON.parse(atob(token.split('.')[1]));}catch(e){return null;}}

const AI_PROMPT=`You are a Vietnamese fashion marketing expert. Analyze this clothing product image and return ONLY a JSON object. No markdown, no text outside JSON.
IMPORTANT: You MUST include ALL fields especially "kich_thuoc" array with exactly 4 sizes.
Return this exact JSON structure:
{"ten_san_pham":"tên sản phẩm hấp dẫn bằng tiếng Việt","mo_ta_ngan":"caption 1 câu ngắn gọn","mo_ta_chi_tiet":"mô tả 3-4 câu về chất liệu và kiểu dáng","hashtag":["#thờitrang","#ootd","#fashion","#style","#outfit","#fyp"],"kich_thuoc":[{"size":"S","vong_eo":"60-64cm","vong_mong":"86-90cm","dai":"98cm"},{"size":"M","vong_eo":"65-69cm","vong_mong":"91-95cm","dai":"99cm"},{"size":"L","vong_eo":"70-74cm","vong_mong":"96-100cm","dai":"100cm"},{"size":"XL","vong_eo":"75-80cm","vong_mong":"101-106cm","dai":"101cm"}],"script_video":"[Cảnh quay 1] mô tả cảnh đầu. [Text] câu hook. [Cảnh quay 2] mô tả tiếp. [Text] điểm nổi bật. [Cảnh quay 3] cảnh kết. [Text] call to action mua ngay","gia_de_xuat":"150.000 - 350.000 VNĐ","mau_sac":"màu chính của sản phẩm","chat_lieu":"chất liệu dự đoán","diem_ban":["Điểm nổi bật 1","Điểm nổi bật 2","Điểm nổi bật 3"]}`;

const Btn=({ch,onClick,disabled,variant="gold",full,sz="md"})=>{
const S={gold:{bg:`linear-gradient(135deg,${G.gold},${G.gdim})`,col:"#000",brd:"none"},ghost:{bg:"transparent",col:G.dim,brd:`1px solid ${G.bor}`},red:{bg:"#1a0808",col:G.red,brd:`1px solid #5a1515`},grn:{bg:"linear-gradient(135deg,#2a8a50,#1a5a30)",col:"#fff",brd:"none"}};
const s=S[variant]||S.gold;
return <button onClick={onClick} disabled={disabled} style={{padding:sz==="sm"?"7px 16px":"12px 24px",fontSize:sz==="sm"?12:13,fontWeight:700,fontFamily:"inherit",background:s.bg,color:s.col,border:s.brd,borderRadius:9,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.4:1,width:full?"100%":undefined,letterSpacing:"0.04em",whiteSpace:"nowrap",transition:"transform 0.1s"}} onMouseEnter={e=>{if(!disabled)e.currentTarget.style.transform="translateY(-1px)"}} onMouseLeave={e=>e.currentTarget.style.transform="none"}>{ch}</button>;
};
const Card=({children,style={}})=><div style={{background:G.sur,border:`1px solid ${G.bor}`,borderRadius:12,padding:18,...style}}>{children}</div>;
const Tag=({children,color=G.dim})=><span style={{padding:"4px 12px",background:"#1a1a1a",border:`1px solid ${G.bor}`,borderRadius:20,fontSize:11,color}}>{children}</span>;
const CopyBtn=({text,id,copied,onCopy})=><button onClick={()=>onCopy(text,id)} style={{background:"none",border:`1px solid ${G.bor}`,borderRadius:6,color:copied===id?G.grn:G.dim,padding:"3px 10px",fontSize:10,cursor:"pointer",fontFamily:"inherit"}}>{copied===id?"✓ Đã copy":"📋 Copy"}</button>;

function LoginPage({onLogin}){
const [email,setEmail]=useState("");
const [pass,setPass]=useState("");
const [mode,setMode]=useState("login");
const [err,setErr]=useState("");
const [loading,setLoading]=useState(false);
useEffect(()=>{
const initGoogle=()=>{
if(window.google&&document.getElementById("google-btn")){
window.google.accounts.id.initialize({client_id:GOOGLE_CLIENT_ID,callback:(res)=>{const payload=parseJwt(res.credential);if(payload)onLogin({email:payload.email,name:payload.name,avatar:payload.picture,googleId:payload.sub});}});
window.google.accounts.id.renderButton(document.getElementById("google-btn"),{theme:"filled_black",size:"large",text:"signin_with",shape:"rectangular",width:332});
}else{setTimeout(initGoogle,300);}
};
initGoogle();
},[]);
const submit=()=>{
setErr("");
if(!email.match(/^[^@]+@[^@]+\.[^@]+$/)){setErr("Email không hợp lệ.");return;}
if(pass.length<6){setErr("Mật khẩu ít nhất 6 ký tự.");return;}
setLoading(true);
setTimeout(()=>{setLoading(false);onLogin({email,name:email.split("@")[0]});},900);
};
const inp=(label,val,set,type,ph,icon)=>(
<div style={{marginBottom:14}}>
<label style={{display:"block",fontSize:11,color:G.dim,marginBottom:5,letterSpacing:"0.08em"}}>{label}</label>
<div style={{position:"relative"}}>
{icon&&<span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,opacity:0.35}}>{icon}</span>}
<input type={type} value={val} onChange={e=>set(e.target.value)} placeholder={ph} onKeyDown={e=>e.key==="Enter"&&submit()} style={{width:"100%",padding:icon?"10px 14px 10px 38px":"10px 14px",background:"#0d0d0d",border:`1px solid ${G.bor}`,borderRadius:9,color:G.tx,fontSize:13,outline:"none"}} onFocus={e=>e.target.style.borderColor=G.gdim} onBlur={e=>e.target.style.borderColor=G.bor}/>
</div>
</div>
);
return(
<div style={{minHeight:"100vh",background:G.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
<div style={{width:"100%",maxWidth:380}}>
<div className="fu1" style={{textAlign:"center",marginBottom:32}}>
<div style={{fontSize:28,fontWeight:"bold",color:G.gold,letterSpacing:"0.1em",marginBottom:6}}>✦ STYLAIR</div>
<div style={{fontSize:12,color:G.dim,letterSpacing:"0.15em"}}>AI FASHION MARKETING</div>
</div>
<div className="fu2" style={{background:G.sur,border:`1px solid ${G.bor}`,borderRadius:18,padding:"28px 24px"}}>
<div style={{display:"flex",background:G.bg,borderRadius:10,padding:4,marginBottom:24}}>
{["login","signup"].map(m=><button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:"8px",border:"none",borderRadius:8,background:mode===m?G.sur:"transparent",color:mode===m?G.gold:G.dim,fontFamily:"inherit",fontSize:12,fontWeight:mode===m?700:400,cursor:"pointer",letterSpacing:"0.05em"}}>{m==="login"?"Đăng nhập":"Đăng ký"}</button>)}
</div>
{inp("EMAIL",email,setEmail,"email","you@example.com","✉")}
{inp("MẬT KHẨU",pass,setPass,"password","••••••••","🔒")}
{err&&<div style={{background:"#180808",border:`1px solid #5a1515`,borderRadius:8,padding:"8px 12px",color:G.red,fontSize:11,marginBottom:14}}>{err}</div>}
<Btn ch={loading?"⏳ Đang xử lý...":mode==="login"?"Đăng nhập →":"Đăng ký →"} onClick={submit} full disabled={loading}/>
<div style={{display:"flex",alignItems:"center",gap:10,margin:"18px 0"}}>
<div style={{flex:1,height:1,background:G.bor}}/><span style={{fontSize:10,color:G.faint}}>HOẶC</span><div style={{flex:1,height:1,background:G.bor}}/>
</div>
<div id="google-btn" style={{display:"flex",justifyContent:"center"}}></div>
</div>
<div className="fu3" style={{textAlign:"center",marginTop:16,fontSize:11,color:G.faint}}>Dùng thử <span style={{color:G.gold}}>3 lần miễn phí</span> · Không cần thẻ</div>
</div>
</div>
);
}

const [tab,setTab]=useState("mo_ta");
const [copied,setCopied]=useState(null);
const inputRef=useRef();
const hasCredits=activePlan?planCredits>0:freeLeft>0;
const locked=!hasCredits;
const freeDisplay=activePlan?`${planCredits} lượt (${activePlan})`:`${freeLeft}/${FREE_LIMIT} lượt miễn phí`;
const copy=(text,key)=>{navigator.clipboard.writeText(text).catch(()=>{});setCopied(key);setTimeout(()=>setCopied(null),2000);};
const loadFile=file=>{
if(!file||locked)return;
setImgMime(file.type||"image/jpeg");
const r=new FileReader();
r.onload=ev=>{const d=ev.target.result;setImgDataUrl(d);setImgB64(d.split(",")[1]);};
r.readAsDataURL(file);
};
const analyze=async()=>{
if(!imgB64||locked||loading)return;
setLoading(true);setError(null);setResult(null);
try{
// ✅ Gọi proxy server — key an toàn, không lộ ra browser
const res=await fetch('/api/analyze',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({imageBase64:imgB64,imageMime:imgMime})
});
const data=await res.json();
if(data.error){setError("Lỗi API: "+(data.error.message||JSON.stringify(data.error)));setLoading(false);return;}
const rawText=data.choices?.[0]?.message?.content||"";
const match=rawText.match(/\{[\s\S]*\}/);
if(!match){setError("AI không trả về đúng định dạng. Thử lại!");setLoading(false);return;}
const parsed=JSON.parse(match[0]);
setResult(parsed);setTab("mo_ta");
if(activePlan&&user?.email){
try{await fetch(BACKEND+"/use-credit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:user.email})});}catch(e){}
setPlanCredits(c=>c-1);
}else{
setFreeLeft(n=>{const next=n-1;if(user?.email)localStorage.setItem('free_'+user.email,next);return next;});
}
}catch(e){setError("Lỗi: "+e.message);}
setLoading(false);
};

return(
<div style={{height:"100vh",background:G.bg,color:G.tx,display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{padding:"10px 18px",borderBottom:`1px solid ${G.bor}`,display:"flex",alignItems:"center",gap:10,background:G.sur,flexShrink:0,flexWrap:"wrap"}}>
<span style={{fontWeight:"bold",color:G.gold,fontSize:15,letterSpacing:"0.06em"}}>✦ STYLAIR</span>
<span style={{padding:"2px 10px",background:"#181818",border:`1px solid ${G.bor}`,borderRadius:20,fontSize:10,color:G.dim}}>🪪 {userCode}</span>
<div style={{flex:1}}/>
{user?.avatar&&<img src={user.avatar} style={{width:24,height:24,borderRadius:"50%"}}/>}
{locked
?<span onClick={onNeedPay} style={{padding:"4px 12px",background:"#200808",border:`1px solid ${G.red}`,borderRadius:20,fontSize:11,color:G.red,cursor:"pointer",fontWeight:"bold"}}>🔒 Hết lượt — Nâng cấp</span>
:<span style={{padding:"4px 12px",background:G.gold+"20",border:`1px solid ${G.gdim}`,borderRadius:20,fontSize:11,color:G.gold}}>🎁 {freeDisplay}</span>
}
<Btn ch="← Trang chủ" onClick={onBack} variant="ghost" sz="sm"/>
</div>
{locked&&<div style={{background:"linear-gradient(90deg,#160800,#161200)",borderBottom:`1px solid ${G.gdim}`,padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexShrink:0,flexWrap:"wrap"}}>
<span style={{fontSize:12}}>🔒 Hết lượt — chọn gói để tiếp tục</span><Btn ch="Xem gói →" onClick={onNeedPay} sz="sm"/>
</div>}
<div style={{display:"flex",flex:1,overflow:"hidden"}}>
<div style={{width:240,flexShrink:0,borderRight:`1px solid ${G.bor}`,padding:"16px 14px",background:G.sur,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
<div style={{fontSize:9,letterSpacing:"0.25em",color:G.dim}}>ẢNH SẢN PHẨM</div>
<div onClick={()=>{if(!locked)inputRef.current.click();else onNeedPay();}} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();loadFile(e.dataTransfer.files[0]);}} style={{border:imgDataUrl?`1px solid ${G.bor}`:`2px dashed ${G.faint}`,borderRadius:12,overflow:"hidden",cursor:locked?"not-allowed":"pointer",aspectRatio:"3/4",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",flexShrink:0}}>
{imgDataUrl?<img src={imgDataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{textAlign:"center",padding:14}}><div style={{fontSize:32,marginBottom:8,opacity:0.4}}>👗</div><div style={{fontSize:11,color:G.faint,marginBottom:4}}>Click hoặc kéo thả</div><div style={{fontSize:10,color:G.faint,opacity:0.5}}>JPG · PNG · WEBP</div></div>}
{locked&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>🔒</div>}
</div>
<input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{loadFile(e.target.files[0]);e.target.value="";}}/>
{locked?<Btn ch="🔒 Nâng cấp để tiếp tục" onClick={onNeedPay} variant="red" full sz="sm"/>:<Btn ch={loading?"⏳ Đang phân tích...":"✦ Phân tích ngay"} onClick={analyze} disabled={!imgB64||loading} full/>}
{imgDataUrl&&!locked&&<Btn ch="Đổi ảnh khác" onClick={()=>{setImgDataUrl(null);setImgB64(null);setResult(null);setError(null);}} variant="ghost" full sz="sm"/>}
{error&&<div style={{padding:10,background:"#180808",border:`1px solid #3a1515`,borderRadius:8,color:G.red,fontSize:11,lineHeight:1.6}}>{error}</div>}
<div style={{marginTop:"auto"}}>
<div style={{padding:"10px 12px",background:"#0d0d0d",borderRadius:8,border:`1px solid ${G.bor}`}}>
<div style={{fontSize:10,color:G.dim,marginBottom:5}}>AI tạo ra:</div>
{["Caption & mô tả","Hashtag tối ưu","Bảng size chuẩn","Script TikTok 30s","Phân tích điểm bán"].map(f=><div key={f} style={{fontSize:10,color:G.faint,marginBottom:3}}>✓ {f}</div>)}
</div>
</div>
</div>
<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
{!result&&!loading&&<div style={{height:"100%",minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{fontSize:54,opacity:0.08}}>✦</div><div style={{fontSize:15,color:G.dim}}>Upload ảnh để AI phân tích</div><div style={{fontSize:12,color:G.faint,textAlign:"center",maxWidth:240,lineHeight:1.9}}>AI sẽ tự tạo toàn bộ nội dung marketing</div></div>}
{loading&&<div style={{height:"100%",minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{width:46,height:46,border:`2px solid ${G.bor}`,borderTop:`2px solid ${G.gold}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:G.dim,fontSize:14}}>AI đang phân tích...</div><div style={{color:G.faint,fontSize:12}}>Thường mất 5–10 giây</div></div>}
{result&&<div>
<div style={{marginBottom:20}}>
<div style={{fontSize:20,fontWeight:"bold",color:G.gold,marginBottom:10}}>{result.ten_san_pham}</div>
<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}><Tag>🎨 {result.mau_sac}</Tag><Tag>🧵 {result.chat_lieu}</Tag><Tag color={G.gold}>💰 {result.gia_de_xuat}</Tag></div>
{result.diem_ban&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{result.diem_ban.map((d,i)=><div key={i} style={{padding:"6px 12px",background:"#0a180a",border:"1px solid #1a3a1a",borderRadius:8,fontSize:11,color:"#70d890"}}>✓ {d}</div>)}</div>}
</div>
<div style={{display:"flex",borderBottom:`1px solid ${G.bor}`,marginBottom:18}}>
{[["mo_ta","📝 Mô tả"],["kich_thuoc","📏 Size"],["video","🎬 Script"],["social","📱 Social"]].map(([id,label])=>(
<button key={id} onClick={()=>setTab(id)} style={{padding:"9px 14px",background:"none",border:"none",fontFamily:"inherit",borderBottom:tab===id?`2px solid ${G.gold}`:"2px solid transparent",color:tab===id?G.gold:G.dim,fontSize:12,cursor:"pointer",marginBottom:-1}}>{label}</button>
))}
</div>
{tab==="mo_ta"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
{[["CAPTION NGẮN",result.mo_ta_ngan,"cap"],["MÔ TẢ CHI TIẾT",result.mo_ta_chi_tiet,"det"]].map(([title,text,key])=>(
<Card key={key}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>{title}</span><CopyBtn text={text} id={key} copied={copied} onCopy={copy}/></div><p style={{color:G.tx,lineHeight:1.8,margin:0,fontSize:13}}>{text}</p></Card>
))}
</div>}
{tab==="kich_thuoc"&&<Card><div style={{fontSize:9,letterSpacing:"0.2em",color:G.dim,marginBottom:14}}>BẢNG KÍCH THƯỚC</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Size","Vòng eo","Vòng mông","Dài"].map(h=><th key={h} style={{padding:"9px 10px",textAlign:"left",fontSize:10,color:G.dim,borderBottom:`1px solid ${G.bor}`,fontWeight:600}}>{h}</th>)}</tr></thead><tbody>{result.kich_thuoc?.map((row,i)=><tr key={i} style={{borderBottom:`1px solid ${G.bor}`}}><td style={{padding:"10px",color:G.gold,fontWeight:"bold",fontSize:13}}>{row.size}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.vong_eo}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.vong_mong}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.dai}</td></tr>)}</tbody></table></Card>}
{tab==="video"&&<Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>SCRIPT TIKTOK / REELS — 30 GIÂY</span><CopyBtn text={result.script_video} id="sc" copied={copied} onCopy={copy}/></div><div style={{background:"#0a0a0a",borderRadius:8,padding:16,borderLeft:`3px solid ${G.gold}`}}><p style={{color:G.dim,lineHeight:2,fontSize:13,margin:0,whiteSpace:"pre-wrap"}}>{result.script_video}</p></div></Card>}
{tab==="social"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
<Card><div style={{fontSize:9,letterSpacing:"0.2em",color:G.dim,marginBottom:12}}>HASHTAG — click để copy</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{result.hashtag?.map((t,i)=><span key={i} onClick={()=>copy(t,`h${i}`)} style={{padding:"5px 14px",background:copied===`h${i}`?G.gold+"30":G.gold+"15",border:`1px solid ${copied===`h${i}`?G.gold:G.gdim}`,borderRadius:20,fontSize:12,color:G.gold,cursor:"pointer"}}>{t}</span>)}</div></Card>
<Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>POST HOÀN CHỈNH</span><CopyBtn text={`✨ ${result.mo_ta_ngan}\n\n${result.mo_ta_chi_tiet}\n\n${result.hashtag?.join(" ")}`} id="post" copied={copied} onCopy={copy}/></div><div style={{background:"#0a0a0a",borderRadius:8,padding:14,lineHeight:1.9}}><p style={{margin:"0 0 10px",fontSize:13}}>✨ {result.mo_ta_ngan}</p><p style={{margin:"0 0 10px",fontSize:12,color:G.dim}}>{result.mo_ta_chi_tiet}</p><p style={{margin:0,fontSize:12,color:G.gold}}>{result.hashtag?.join(" ")}</p></div></Card>
</div>}
</div>}
</div>
</div>
</div>
);
}

function App(){
const [userCode]=useState(()=>genCode());
const [user,setUser]=useState(null);
const [page,setPage]=useState("landing");
const [freeLeft,setFreeLeft]=useState(FREE_LIMIT);
const [activePlan,setActivePlan]=useState(null);
const [planCredits,setPlanCredits]=useState(0);
const [showPaywall,setShowPaywall]=useState(false);
const [payPlan,setPayPlan]=useState(null);
const [syncing,setSyncing]=React.useState(false);
const syncUser=async(u)=>{
try{
setSyncing(true);
const res=await fetch(BACKEND+"/sync-user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:u.email,name:u.name,user_code:userCode})});
const data=await res.json();
if(data.credits>0){setPlanCredits(data.credits);setActivePlan(data.plan);}
}catch(e){console.log("sync err",e);}
setSyncing(false);
};
const handleLogin=(u)=>{
setUser(u);
const saved=localStorage.getItem('free_'+u.email);
if(saved!==null)setFreeLeft(parseInt(saved));
syncUser(u);
};
const handleActivate=planName=>{
setPlanCredits(c=>c+PLANS[planName].credits);
setActivePlan(planName);
setPayPlan(null);setShowPaywall(false);
};
const handleLogout=()=>{
if(window.google)window.google.accounts.id.disableAutoSelect();
setUser(null);setPage("landing");setPlanCredits(0);setActivePlan(null);setFreeLeft(FREE_LIMIT);
};
if(!user)return <LoginPage onLogin={handleLogin}/>;
if(syncing)return <div style={{height:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",gap:14}}><div style={{width:36,height:36,border:"2px solid #1f1f1f",borderTop:"2px solid #4CAF50",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#7a7060",fontSize:14}}>Đang tải tài khoản...</div></div>;
return <>
{showPaywall&&<PaywallModal onSelectPlan={p=>{setShowPaywall(false);setPayPlan(p);}} onClose={()=>setShowPaywall(false)}/>}
{payPlan&&<PaymentModal planName={payPlan} userCode={userCode} onClose={()=>setPayPlan(null)} onActivate={handleActivate}/>}
{page==="landing"&&<LandingPage userCode={userCode} user={user} onStart={()=>setPage("tool")} onPaywall={p=>setPayPlan(p)} onLogout={handleLogout}/>}
{page==="tool"&&<ToolPage userCode={userCode} freeLeft={freeLeft} setFreeLeft={setFreeLeft} activePlan={activePlan} planCredits={planCredits} setPlanCredits={setPlanCredits} onNeedPay={()=>setShowPaywall(true)} onBack={()=>setPage("landing")} user={user}/>}
</>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>

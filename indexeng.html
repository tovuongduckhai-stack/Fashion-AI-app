function ToolPage({userCode,freeLeft,setFreeLeft,activePlan,planCredits,setPlanCredits,onNeedPay,onBack,user}){
const [imgDataUrl,setImgDataUrl]=useState(null);
const [imgB64,setImgB64]=useState(null);
const [imgMime,setImgMime]=useState("image/jpeg");
const [loading,setLoading]=useState(false);
const [result,setResult]=useState(null);
const [error,setError]=useState(null);
const [tab,setTab]=useState("description");
const [copied,setCopied]=useState(null);
const inputRef=useRef();
const hasCredits=activePlan?planCredits>0:freeLeft>0;
const locked=!hasCredits;
const freeDisplay=activePlan?`${planCredits} credits (${activePlan})`:`${freeLeft}/${FREE_LIMIT} free credits left`;
const copy=(text,key)=>{navigator.clipboard.writeText(text).catch(()=>{});setCopied(key);setTimeout(()=>setCopied(null),2000);};
const loadFile=file=>{
if(!file||locked)return;
setImgMime(file.type||"image/jpeg");
const r=new FileReader();
r.onload=ev=>{const d=ev.target.result;setImgDataUrl(d);setImgB64(d.split(",")[1]);};
r.readAsDataURL(file);
};
const analyze=async()=>{
if(!imgB64||locked||loading)return;
setLoading(true);setError(null);setResult(null);
try{
const res=await fetch('/api/analyze',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({imageBase64:imgB64,imageMime:imgMime})
});
const data=await res.json();
if(data.error){setError("API Error: "+(data.error.message||JSON.stringify(data.error)));setLoading(false);return;}
const rawText=data.choices?.[0]?.message?.content||"";
const match=rawText.match(/\{[\s\S]*\}/);
if(!match){setError("AI returned an unexpected format. Please try again.");setLoading(false);return;}
const parsed=JSON.parse(match[0]);
setResult(parsed);setTab("description");
if(activePlan&&user?.email){
try{await fetch(BACKEND+"/use-credit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:user.email})});}catch(e){}
setPlanCredits(c=>c-1);
}else{
setFreeLeft(n=>{const next=n-1;if(user?.email)localStorage.setItem('free_'+user.email,next);return next;});
}
}catch(e){setError("Error: "+e.message);}
setLoading(false);
};

return(
<div style={{height:"100vh",background:G.bg,color:G.tx,display:"flex",flexDirection:"column",overflow:"hidden"}}>
<div style={{padding:"10px 18px",borderBottom:`1px solid ${G.bor}`,display:"flex",alignItems:"center",gap:10,background:G.sur,flexShrink:0,flexWrap:"wrap"}}>

<div style={{flex:1}}/>
{user?.avatar&&<img src={user.avatar} style={{width:24,height:24,borderRadius:"50%"}}/>}
{locked
?<span onClick={onNeedPay} style={{padding:"4px 12px",background:"#200808",border:`1px solid ${G.red}`,borderRadius:20,fontSize:11,color:G.red,cursor:"pointer",fontWeight:"bold"}}>🔒 No credits — Upgrade</span>
:<span style={{padding:"4px 12px",background:G.gold+"20",border:`1px solid ${G.gdim}`,borderRadius:20,fontSize:11,color:G.gold}}>🎁 {freeDisplay}</span>
}
<Btn ch="← Home" onClick={onBack} variant="ghost" sz="sm"/>
</div>
{locked&&<div style={{background:"linear-gradient(90deg,#160800,#161200)",borderBottom:`1px solid ${G.gdim}`,padding:"9px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,flexShrink:0,flexWrap:"wrap"}}>
<span style={{fontSize:12}}>🔒 Out of credits — choose a plan to continue</span><Btn ch="View Plans →" onClick={onNeedPay} sz="sm"/>
</div>}
<div style={{display:"flex",flex:1,overflow:"hidden"}}>
<div style={{width:240,flexShrink:0,borderRight:`1px solid ${G.bor}`,padding:"16px 14px",background:G.sur,display:"flex",flexDirection:"column",gap:12,overflowY:"auto"}}>
<div style={{fontSize:9,letterSpacing:"0.25em",color:G.dim}}>PRODUCT IMAGE</div>
<div onClick={()=>{if(!locked)inputRef.current.click();else onNeedPay();}} onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();loadFile(e.dataTransfer.files[0]);}} style={{border:imgDataUrl?`1px solid ${G.bor}`:`2px dashed ${G.faint}`,borderRadius:12,overflow:"hidden",cursor:locked?"not-allowed":"pointer",aspectRatio:"3/4",background:"#0a0a0a",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",flexShrink:0}}>
{imgDataUrl?<img src={imgDataUrl} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{textAlign:"center",padding:14}}><div style={{fontSize:32,marginBottom:8,opacity:0.4}}>👗</div><div style={{fontSize:11,color:G.faint,marginBottom:4}}>Click or drag & drop</div><div style={{fontSize:10,color:G.faint,opacity:0.5}}>JPG · PNG · WEBP</div></div>}
{locked&&<div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30}}>🔒</div>}
</div>
<input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{loadFile(e.target.files[0]);e.target.value="";}}/>
{locked?<Btn ch="🔒 Upgrade to Continue" onClick={onNeedPay} variant="red" full sz="sm"/>:<Btn ch={loading?"⏳ Analyzing...":"✦ Analyze Now"} onClick={analyze} disabled={!imgB64||loading} full/>}
{imgDataUrl&&!locked&&<Btn ch="Change Image" onClick={()=>{setImgDataUrl(null);setImgB64(null);setResult(null);setError(null);}} variant="ghost" full sz="sm"/>}
{error&&<div style={{padding:10,background:"#180808",border:`1px solid #3a1515`,borderRadius:8,color:G.red,fontSize:11,lineHeight:1.6}}>{error}</div>}
<div style={{marginTop:"auto"}}>
<div style={{padding:"10px 12px",background:"#0d0d0d",borderRadius:8,border:`1px solid ${G.bor}`}}>
<div style={{fontSize:10,color:G.dim,marginBottom:5}}>AI generates:</div>
{["Caption & description","Optimized hashtags","Size chart","TikTok/Reels script","Selling point analysis"].map(f=><div key={f} style={{fontSize:10,color:G.faint,marginBottom:3}}>✓ {f}</div>)}
</div>
</div>
</div>
<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
{!result&&!loading&&<div style={{height:"100%",minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}><div style={{fontSize:54,opacity:0.08}}>✦</div><div style={{fontSize:15,color:G.dim}}>Upload an image to get started</div><div style={{fontSize:12,color:G.faint,textAlign:"center",maxWidth:240,lineHeight:1.9}}>AI will generate all your marketing content instantly</div></div>}
{loading&&<div style={{height:"100%",minHeight:320,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><div style={{width:46,height:46,border:`2px solid ${G.bor}`,borderTop:`2px solid ${G.gold}`,borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:G.dim,fontSize:14}}>AI is analyzing your product...</div><div style={{color:G.faint,fontSize:12}}>Usually takes 5–10 seconds</div></div>}
{result&&<div>
<div style={{marginBottom:20}}>
<div style={{fontSize:20,fontWeight:"bold",color:G.gold,marginBottom:10}}>{result.product_name}</div>
<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}><Tag>🎨 {result.color}</Tag><Tag>🧵 {result.material}</Tag><Tag color={G.gold}>💰 {result.suggested_price}</Tag></div>
{result.selling_points&&<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{result.selling_points.map((d,i)=><div key={i} style={{padding:"6px 12px",background:"#0a180a",border:"1px solid #1a3a1a",borderRadius:8,fontSize:11,color:"#70d890"}}>✓ {d}</div>)}</div>}
</div>
<div style={{display:"flex",borderBottom:`1px solid ${G.bor}`,marginBottom:18}}>
{[["description","📝 Description"],["size_chart","📏 Sizes"],["video","🎬 Script"],["social","📱 Social"]].map(([id,label])=>(
<button key={id} onClick={()=>setTab(id)} style={{padding:"9px 14px",background:"none",border:"none",fontFamily:"inherit",borderBottom:tab===id?`2px solid ${G.gold}`:"2px solid transparent",color:tab===id?G.gold:G.dim,fontSize:12,cursor:"pointer",marginBottom:-1}}>{label}</button>
))}
</div>
{tab==="description"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
{[["SHORT CAPTION",result.short_caption,"cap"],["DETAILED DESCRIPTION",result.detailed_description,"det"]].map(([title,text,key])=>(
<Card key={key}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>{title}</span><CopyBtn text={text} id={key} copied={copied} onCopy={copy}/></div><p style={{color:G.tx,lineHeight:1.8,margin:0,fontSize:13}}>{text}</p></Card>
))}
</div>}
{tab==="size_chart"&&<Card><div style={{fontSize:9,letterSpacing:"0.2em",color:G.dim,marginBottom:14}}>SIZE CHART</div><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{["Size","Waist","Hips","Length"].map(h=><th key={h} style={{padding:"9px 10px",textAlign:"left",fontSize:10,color:G.dim,borderBottom:`1px solid ${G.bor}`,fontWeight:600}}>{h}</th>)}</tr></thead><tbody>{result.size_chart?.map((row,i)=><tr key={i} style={{borderBottom:`1px solid ${G.bor}`}}><td style={{padding:"10px",color:G.gold,fontWeight:"bold",fontSize:13}}>{row.size}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.waist}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.hips}</td><td style={{padding:"10px",color:G.dim,fontSize:12}}>{row.length}</td></tr>)}</tbody></table></Card>}
{tab==="video"&&<Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>TIKTOK / REELS SCRIPT — 30 SECONDS</span><CopyBtn text={result.video_script} id="sc" copied={copied} onCopy={copy}/></div><div style={{background:"#0a0a0a",borderRadius:8,padding:16,borderLeft:`3px solid ${G.gold}`}}><p style={{color:G.dim,lineHeight:2,fontSize:13,margin:0,whiteSpace:"pre-wrap"}}>{result.video_script}</p></div></Card>}
{tab==="social"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
<Card><div style={{fontSize:9,letterSpacing:"0.2em",color:G.dim,marginBottom:12}}>HASHTAGS — click to copy</div><div style={{display:"flex",flexWrap:"wrap",gap:8}}>{result.hashtags?.map((t,i)=><span key={i} onClick={()=>copy(t,`h${i}`)} style={{padding:"5px 14px",background:copied===`h${i}`?G.gold+"30":G.gold+"15",border:`1px solid ${copied===`h${i}`?G.gold:G.gdim}`,borderRadius:20,fontSize:12,color:G.gold,cursor:"pointer"}}>{t}</span>)}</div></Card>
<Card><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:9,letterSpacing:"0.2em",color:G.dim}}>COMPLETE POST</span><CopyBtn text={`✨ ${result.short_caption}\n\n${result.detailed_description}\n\n${result.hashtags?.join(" ")}`} id="post" copied={copied} onCopy={copy}/></div><div style={{background:"#0a0a0a",borderRadius:8,padding:14,lineHeight:1.9}}><p style={{margin:"0 0 10px",fontSize:13}}>✨ {result.short_caption}</p><p style={{margin:"0 0 10px",fontSize:12,color:G.dim}}>{result.detailed_description}</p><p style={{margin:0,fontSize:12,color:G.gold}}>{result.hashtags?.join(" ")}</p></div></Card>
</div>}
</div>}
</div>
</div>
</div>
);
}

function App(){
const [userCode,setUserCode]=useState(null);
const [user,setUser]=useState(null);
const [page,setPage]=useState("landing");
const [freeLeft,setFreeLeft]=useState(FREE_LIMIT);
const [activePlan,setActivePlan]=useState(null);
const [planCredits,setPlanCredits]=useState(0);
const [showPaywall,setShowPaywall]=useState(false);
const [payPlan,setPayPlan]=useState(null);
const [syncing,setSyncing]=React.useState(false);

const syncUser=async(u)=>{
try{
setSyncing(true);
const tempCode=genCode();
const res=await fetch(BACKEND+"/sync-user",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:u.email,name:u.name,user_code:tempCode})});
const data=await res.json();
if(data.user_code)setUserCode(data.user_code);
if(data.credits>0){setPlanCredits(data.credits);setActivePlan(data.plan);}
}catch(e){console.log("sync err",e);}
setSyncing(false);
};

const handleLogin=(u)=>{
setUser(u);
const saved=localStorage.getItem('free_'+u.email);
if(saved!==null)setFreeLeft(parseInt(saved));
syncUser(u);
};
const handleLogout=()=>{
if(window.google)window.google.accounts.id.disableAutoSelect();
setUser(null);setPage("landing");setPlanCredits(0);setActivePlan(null);setFreeLeft(FREE_LIMIT);setUserCode(null);
};
if(!user)return <LoginPage onLogin={handleLogin}/>;
if(syncing)return <div style={{height:"100vh",background:"#080808",display:"flex",alignItems:"center",justifyContent:"center",gap:14}}><div style={{width:36,height:36,border:"2px solid #1f1f1f",borderTop:"2px solid #4CAF50",borderRadius:"50%",animation:"spin 1s linear infinite"}}/><div style={{color:"#7a7060",fontSize:14}}>Loading your account...</div></div>;
return <>
{showPaywall&&<PaywallModal onSelectPlan={p=>{setShowPaywall(false);setPayPlan(p);}} onClose={()=>setShowPaywall(false)}/>}
{payPlan&&<PaymentModal planName={payPlan} userCode={userCode} onClose={()=>setPayPlan(null)}/>}
{page==="landing"&&<LandingPage userCode={userCode} user={user} onStart={()=>setPage("tool")} onPaywall={p=>setPayPlan(p)} onLogout={handleLogout}/>}
{page==="tool"&&<ToolPage userCode={userCode} freeLeft={freeLeft} setFreeLeft={setFreeLeft} activePlan={activePlan} planCredits={planCredits} setPlanCredits={setPlanCredits} onNeedPay={()=>setShowPaywall(true)} onBack={()=>setPage("landing")} user={user}/>}
</>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
